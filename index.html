<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-50 min-h-screen">

    <div id="login-screen" class="flex items-center justify-center min-h-screen p-4">
        <div class="card w-full max-w-md bg-base-100 shadow-xl border border-gray-100 p-8">
            <div class="flex flex-col items-center mb-6">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="Logo" class="w-16 h-16 mb-4">
                <h2 class="text-2xl font-bold">GitHub Issues Tracker</h2>
                <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div class="form-control">
                    <label class="label"><span class="label-text font-semibold">Username</span></label>
                    <input type="text" id="username" placeholder="Enter Username" class="input input-bordered w-full" required />
                </div>
                <div class="form-control">
                    <label class="label"><span class="label-text font-semibold">Password</span></label>
                    <input type="password" id="password" placeholder="Enter Password" class="input input-bordered w-full" required />
                </div>
                <button type="submit" class="btn btn-primary w-full bg-indigo-600 border-none hover:bg-indigo-700 mt-4">Sign In</button>
            </form>

            <div class="divider">OR</div>
            <div class="bg-gray-50 p-4 rounded-lg text-center text-sm">
                <p class="text-gray-400 mb-2">Demo Credentials:</p>
                <p><strong>Username:</strong> admin | <strong>Password:</strong> admin123</p>
            </div>
        </div>
    </div>

    <div id="dashboard-screen" class="hidden">
        <nav class="bg-white border-b px-6 py-4 flex flex-col md:flex-row items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="Logo" class="w-8 h-8">
                <h1 class="font-bold text-lg">GitHub Issues Tracker</h1>
            </div>
            <div class="flex items-center gap-4 w-full md:w-auto">
                <div class="relative w-full md:w-80">
                    <input type="text" id="search-input" placeholder="Search issues..." class="input input-bordered input-sm w-full pl-8" />
                    <span class="absolute left-2.5 top-2 text-gray-400">🔍</span>
                </div>
                <button class="btn btn-primary btn-sm bg-indigo-600 border-none">+ New Issue</button>
                <button onclick="logout()" class="btn btn-ghost btn-sm">Logout</button>
            </div>
        </nav>
        <main class="p-6 max-w-7xl mx-auto">
            <div id="tab-container" class="tabs tabs-boxed mb-6 bg-transparent gap-2">
                <button onclick="filterIssues('all')" class="tab tab-active bg-indigo-600 text-white rounded-md transition-all">All</button>
                <button onclick="filterIssues('open')" class="tab bg-white border transition-all">Open</button>
                <button onclick="filterIssues('closed')" class="tab bg-white border transition-all">Closed</button>
            </div>

            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-100 rounded-lg">⚙️</div>
                    <div>
                        <h3 class="font-bold text-xl"><span id="issue-count">0</span> Issues</h3>
                        <p class="text-xs text-gray-500">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 text-sm">
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-green-500"></span> Open</span>
                    <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-purple-500"></span> Closed</span>
                </div>
            </div>

            <div id="issues-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                </div>
        </main>
    </div>
